  <h1>Abrindo WhatsApp...</h1>

  <div class="fallback">
    <a href="#" id="wa-link">Clique aqui se não redirecionar</a>

<script>
// Mensagem WhatsApp com ref único do e-book
var WA_PHONE = '5521965622891';
var WA_TEXT = 'Vim do webinar do André e quero minha análise de carteira. (ref: ebook-08abr)';
var WA_URL = 'https://wa.me/' + WA_PHONE + '?text=' + encodeURIComponent(WA_TEXT);

// 1. Disparar evento no dataLayer (GTM → Pixel + GA4 + CAPI)
window.dataLayer = window.dataLayer || [];
window.dataLayer.push({
  event: 'ebook_cta_click',
  cta_id: 'ebook_whatsapp',
  source: 'ebook_pdf',
  campaign: 'pos_webinar_1milhao',
  medium: 'pdf'
});

// 2. Enviar conversion para RD Station (lead engagement)
// Não tem form, não precisa email. Só registramos o clique como evento
try {
  var eventId = 'ebook_click_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
  window.dataLayer.push({
    event: 'generate_lead_intent',
    form_id: 'ebook_cta_whatsapp',
    event_id: eventId
  });
} catch(e) {}

// 3. Setar link de fallback
document.getElementById('wa-link').href = WA_URL;

// 4. Redirecionar automaticamente após 400ms (tempo para GTM disparar)
setTimeout(function() {
  window.location.href = WA_URL;
}, 400);
</script>
