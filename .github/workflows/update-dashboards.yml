name: Atualizar Dashboards Meta Ads

on:
  schedule:
    - cron: '0 */6 * * *'   # a cada 6 horas (00h, 06h, 12h, 18h UTC)
  workflow_dispatch:          # permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Gerar dashboard IR Cripto
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python scripts/dashboard_ir_cripto.py

      - name: Gerar dashboard Advisory C4
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python scripts/dashboard_consultoria_boost.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_ir_cripto.html dashboard_consultoria_boost.html
          git diff --staged --quiet || git commit -m "chore: atualizar dashboards $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
